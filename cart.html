<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Mitti & Mann</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">Shopping Cart</li>
      </ol>
    </nav>
    <h1>Your Shopping Cart</h1>
    <p style="color:var(--text-light);margin-top:8px;font-size:0.95rem"><span id="cartItemsCount">0 items</span> in your cart</p>
  </div>
</section>

<!-- CART CONTENT -->
<section class="cart-section">
  <div class="container">
    <div class="row g-4">
      <!-- Cart Items -->
      <div class="col-lg-8">
        <div id="cartItemsContainer">
          <!-- Rendered by JS -->
        </div>
        <div class="mt-3">
          <a href="shop.html" style="color:var(--terracotta);font-size:0.9rem;font-weight:500">
            <i class="bi bi-arrow-left me-2"></i>Continue Shopping
          </a>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="cart-summary-box">
          <h5 style="font-family:'Playfair Display',serif;color:var(--brown);margin-bottom:20px">Order Summary</h5>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summarySubtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="summaryShipping" style="color:var(--green)">₹0</span>
          </div>
          <div class="summary-row">
            <span>Discount</span>
            <span style="color:var(--terracotta)">–₹0</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="summaryTotal">₹0</span>
          </div>

          <!-- Coupon -->
          <div class="mt-4">
            <div class="input-group mb-3" style="border-radius:8px;overflow:hidden">
              <input type="text" class="form-control" placeholder="Coupon code" style="border:1px solid var(--beige-dark);font-family:'Poppins',sans-serif;font-size:0.88rem;outline:none;box-shadow:none">
              <button class="btn" style="background:var(--brown);color:white;font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:600" onclick="showToast('✅ Code applied! 10% discount added.', 'success')">Apply</button>
            </div>
          </div>

          <button class="btn-primary-custom w-100 mt-2" onclick="handleCheckout()">
            <i class="bi bi-lock"></i> Proceed to Checkout
          </button>
          <div class="text-center mt-3">
            <small style="color:var(--text-light);font-size:0.78rem"><i class="bi bi-shield-check me-1"></i>Secure & Encrypted Checkout</small>
          </div>
          <hr style="border-color:var(--beige-dark);margin:16px 0">
          <div style="font-size:0.8rem;color:var(--text-light);text-align:center">
            <i class="bi bi-truck me-1 text-terracotta"></i>Free shipping on orders ₹999+
          </div>
        </div>

        <!-- Trust Badges -->
        <div style="background:white;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--beige-dark);margin-top:16px">
          <div style="font-size:0.82rem;color:var(--text-light);text-align:center;margin-bottom:12px">We accept</div>
          <div class="d-flex justify-content-center gap-2">
            <span style="background:var(--beige);padding:6px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--text-mid)">VISA</span>
            <span style="background:var(--beige);padding:6px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--text-mid)">Mastercard</span>
            <span style="background:var(--beige);padding:6px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--text-mid)">UPI</span>
            <span style="background:var(--beige);padding:6px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;color:var(--text-mid)">COD</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared-layout.js"></script>
<script src="script.js"></script>
<script>
function handleCheckout() {
  const cart = getCart();
  if (cart.length === 0) {
    showToast('Your cart is empty! Add some handmade treasures first.', 'warning');
    return;
  }
  showToast('🎉 Redirecting to checkout… (demo mode)', 'success');
}
</script>
</body>
</html>
