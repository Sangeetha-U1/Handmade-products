<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account – Mitti & Mann</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<section class="page-hero">
  <div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">My Account</li>
      </ol>
    </nav>
    <h1>My Account</h1>
  </div>
</section>

<section class="account-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="account-card">
          <!-- Tab Toggle -->
          <div class="tab-toggle mb-4">
            <button class="tab-toggle-btn active" data-target="loginPane">Login</button>
            <button class="tab-toggle-btn" data-target="registerPane">Create Account</button>
          </div>

          <!-- LOGIN FORM -->
          <div class="account-form-pane" id="loginPane">
            <div class="text-center mb-4">
              <div style="width:64px;height:64px;background:var(--beige);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:var(--terracotta)"><i class="bi bi-person-circle"></i></div>
              <h4 style="color:var(--brown)">Welcome Back!</h4>
              <p style="color:var(--text-light);font-size:0.88rem">Sign in to access your orders and wishlist</p>
            </div>
            <form onsubmit="return handleLogin(event)">
              <div class="mb-3">
                <label class="form-label-custom">Email Address</label>
                <input type="email" class="form-control-custom" placeholder="your@email.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label-custom" style="display:flex;justify-content:space-between">
                  Password <a href="#" style="color:var(--terracotta);font-size:0.82rem;font-weight:400">Forgot password?</a>
                </label>
                <div style="position:relative">
                  <input type="password" class="form-control-custom" placeholder="••••••••" id="loginPwd" required>
                  <button type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-light);cursor:pointer" onclick="togglePwd('loginPwd')"><i class="bi bi-eye"></i></button>
                </div>
              </div>
              <button type="submit" class="btn-primary-custom w-100">Sign In <i class="bi bi-arrow-right"></i></button>
            </form>
            <div class="text-center mt-4">
              <div style="color:var(--text-light);font-size:0.85rem;margin-bottom:16px">— or sign in with —</div>
              <div class="d-flex gap-3 justify-content-center">
                <button style="flex:1;padding:10px;border:1px solid var(--beige-dark);border-radius:8px;background:white;font-size:0.85rem;color:var(--text-mid);cursor:pointer;transition:all 0.2s" onmouseenter="this.style.borderColor='var(--terracotta)'" onmouseleave="this.style.borderColor='var(--beige-dark)'"><i class="bi bi-google me-2 text-danger"></i>Google</button>
                <button style="flex:1;padding:10px;border:1px solid var(--beige-dark);border-radius:8px;background:white;font-size:0.85rem;color:var(--text-mid);cursor:pointer;transition:all 0.2s" onmouseenter="this.style.borderColor='var(--terracotta)'" onmouseleave="this.style.borderColor='var(--beige-dark)'"><i class="bi bi-facebook me-2" style="color:#1877F2"></i>Facebook</button>
              </div>
            </div>
          </div>

          <!-- REGISTER FORM -->
          <div class="account-form-pane" id="registerPane" style="display:none">
            <div class="text-center mb-4">
              <div style="width:64px;height:64px;background:var(--beige);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:var(--terracotta)"><i class="bi bi-person-plus"></i></div>
              <h4 style="color:var(--brown)">Join the Community</h4>
              <p style="color:var(--text-light);font-size:0.88rem">Create your account and get 10% off your first order!</p>
            </div>
            <form onsubmit="return handleRegister(event)">
              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label-custom">First Name</label>
                  <input type="text" class="form-control-custom" placeholder="Priya" required>
                </div>
                <div class="col-6">
                  <label class="form-label-custom">Last Name</label>
                  <input type="text" class="form-control-custom" placeholder="Sharma" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Email Address</label>
                <input type="email" class="form-control-custom" placeholder="priya@email.com" required>
              </div>
              <div class="mb-3">
                <label class="form-label-custom">Phone Number</label>
                <input type="tel" class="form-control-custom" placeholder="+91 98765 43210">
              </div>
              <div class="mb-4">
                <label class="form-label-custom">Password</label>
                <div style="position:relative">
                  <input type="password" class="form-control-custom" placeholder="Min. 8 characters" id="regPwd" required>
                  <button type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-light);cursor:pointer" onclick="togglePwd('regPwd')"><i class="bi bi-eye"></i></button>
                </div>
              </div>
              <div class="mb-4" style="display:flex;gap:10px;align-items:flex-start">
                <input type="checkbox" style="margin-top:3px;accent-color:var(--terracotta)" required>
                <span style="font-size:0.83rem;color:var(--text-light)">I agree to the <a href="#" style="color:var(--terracotta)">Terms of Service</a> and <a href="#" style="color:var(--terracotta)">Privacy Policy</a></span>
              </div>
              <button type="submit" class="btn-primary-custom w-100">Create Account <i class="bi bi-arrow-right"></i></button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared-layout.js"></script>
<script src="script.js"></script>
<script>
function handleLogin(e) {
  e.preventDefault();
  showToast('✅ Login successful! Welcome back to Mitti & Mann.', 'success');
  return false;
}
function handleRegister(e) {
  e.preventDefault();
  showToast('🎉 Account created! Your 10% code: WELCOME10', 'success');
  return false;
}
function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
