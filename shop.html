<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop – Mitti & Mann</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">Shop</li>
      </ol>
    </nav>
    <h1>Our Handmade Collection</h1>
    <p style="color:var(--text-light);margin-top:10px;font-size:0.97rem">Explore authentic handcrafted products from artisans across India</p>
  </div>
</section>

<!-- SHOP CONTENT -->
<section class="shop-section">
  <div class="container">
    <div class="row g-4">

      <!-- FILTER SIDEBAR -->
      <div class="col-lg-3">
        <div class="filter-sidebar">
          <div class="filter-title"><i class="bi bi-funnel me-2"></i>Filter Products</div>

          <!-- Category Filter -->
          <div class="filter-group">
            <span class="filter-group-label">Category</span>
            <label class="filter-check"><input type="checkbox" class="cat-filter" value="Pottery"><span>Pottery</span></label>
            <label class="filter-check"><input type="checkbox" class="cat-filter" value="Handmade Jewelry"><span>Handmade Jewelry</span></label>
            <label class="filter-check"><input type="checkbox" class="cat-filter" value="Home Decor"><span>Home Decor</span></label>
            <label class="filter-check"><input type="checkbox" class="cat-filter" value="Textiles"><span>Textiles</span></label>
            <label class="filter-check"><input type="checkbox" class="cat-filter" value="Wooden Crafts"><span>Wooden Crafts</span></label>
          </div>

          <!-- Price Range -->
          <div class="filter-group">
            <span class="filter-group-label">Price Range</span>
            <div class="price-range">
              <input type="range" id="priceRange" min="0" max="5000" value="5000" step="100">
              <div class="price-display" id="priceDisplay">₹0 – ₹5,000</div>
            </div>
          </div>

          <!-- Rating -->
          <div class="filter-group">
            <span class="filter-group-label">Min Rating</span>
            <label class="filter-check"><input type="radio" name="rating" value="4.5"><span>⭐ 4.5 & above</span></label>
            <label class="filter-check"><input type="radio" name="rating" value="4.0"><span>⭐ 4.0 & above</span></label>
            <label class="filter-check"><input type="radio" name="rating" value="3.5"><span>⭐ 3.5 & above</span></label>
          </div>

          <button class="filter-btn-apply" id="applyFilters">Apply Filters</button>
          <button class="filter-btn-clear" id="clearFilters">Clear All</button>
        </div>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="col-lg-9">
        <!-- Sort Bar -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
          <span class="results-count" id="resultsCount">Showing 20 products</span>
          <div class="d-flex align-items-center gap-2">
            <label style="font-size:0.85rem;color:var(--text-light)">Sort by:</label>
            <select class="sort-select" id="sortSelect">
              <option value="default">Featured</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Highest Rated</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>
        </div>
        <div class="row" id="shopGrid">
          <!-- Rendered by JS -->
        </div>
      </div>

    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared-layout.js"></script>
<script src="script.js"></script>
</body>
</html>
